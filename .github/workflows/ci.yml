name: Some CI workflow

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Compile Application Code
        run: mvn clean compile

      - name: Compile Test Code
        run: mvn test-compile

      - name: Run Tests
        run: mvn verify -Dskip.installnits=true