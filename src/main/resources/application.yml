server:
  port: 8080

spring:
  profiles:
    active: dev

app:
  info:
    name: "Task Manager"
    version: "2.0.0"
    description: "API for managing a task list"

    contact:
      name: "Sergey Rezchikov"
      email: "rezchikov.sa@phystech.edu"
      url: "https://github.com/ex1dee"
  
  cors:
    allowed-origins:
      - "http://localhost:3000"
    max-age: 3600

  session:
    attributes:
      favorite-tasks: "favoriteTasksIds"

  cookie:
    view-mode:
      name: "viewPreference"
      default-value: "detailed"
      max-age: 604800 # 7 days

  storage:
    directories:
      task-attachments: "upload"