server:
  port: ${SERVER_PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

resilience4j:
  circuitbreaker:
    instances:
      externalApi:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true

  ratelimiter:
    instances:
      externalApi:
        limitForPeriod: 5
        limitRefreshPeriod: 1s
        timeoutDuration: 0

app:
  client:
    connection-timeout-sec: 5
    read-timeout-sec: 2

    user-agent: "TM-Gateway-Service"
    base-url: ${EXTERNAL_API_URL}

    log:
      max-error-snippet-length: 100

  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration-ms: 900000 # 15m

    password-pepper: ${PASSWORD_PEPPER}

  info:
    name: "Task Manager"
    version: "2.0.0"
    contact:
      name: "Sergey Rezchikov"
      email: "rezchikov.sa@phystech.edu"

  storage:
    directories:
      task-attachments: "upload"

  cors:
    allowed-origins:
      - "http://localhost:3000"
    max-age: 3600

  cookie:
    view-mode:
      name: "viewPreference"
      default-value: "detailed"
      max-age: 604800 # 7 days

  log:
    trace-id-header: "X-Trace-Id"
    mdc-key: "traceId"