server:
  port: ${SERVER_PORT:8080}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

app:
  info:
    name: "Task Manager"
    version: "2.0.0"
    contact:
      name: "Sergey Rezchikov"
      email: "rezchikov.sa@phystech.edu"

  storage:
    directories:
      task-attachments: "upload"

  cors:
    allowed-origins:
      - "http://localhost:3000"
    max-age: 3600

  session:
    attributes:
      favorite-tasks: "favoriteTasksIds"

  cookie:
    view-mode:
      name: "viewPreference"
      default-value: "detailed"
      max-age: 604800 # 7 days